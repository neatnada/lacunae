<!DOCTYPE html><html><head><meta charset="utf-8"><title>Standalone Test</title></head><body><div class="vf-tester">
  <div class="vf-specimen" contenteditable="true" spellcheck="false" data-placeholder="Typable Area" data-maxlength="86">these lacunae of speech become more potent than words</div>
  <div class="controls-wrapper"><div class="vf-controls"></div></div>
</div>

<script>
  (function () {
    /* find this instance's own elements — works even if this block
       is duplicated elsewhere on the page, unlike getElementById */
    var thisScript = document.currentScript;
    var root = thisScript.previousElementSibling;
    if (!root || !root.classList.contains("vf-tester")) return;

    /* bail out if this exact instance was already initialized —
       Cargo can re-run inline scripts on client-side page navigation
       without a full reload, which would otherwise duplicate the sliders */
    if (root.dataset.vfInit) return;
    root.dataset.vfInit = "true";

    /* ⚑ paste your hosted .woff2 URL here */
    var FONT_URL = "https://freight.cargo.site/m/H3013594974459155713127740277357/LacunaeTest4VF.woff2";
    var FONT_NAME = "Lacunae Test 4 Presence";

    /* ⚑ max characters allowed in the typable specimen area */
    var MAX_CHARS = 86;

    var AXES = [
      { tag: "EXSS", min: 0, max: 100, step: 1, default: 0, low: "Excess", high: "0" },
      { tag: "ABSN", min: 0, max: 100, step: 1, default: 0, low: "Absence", high: "0" }
    ];

    /* ---------- inject styles (only once, even if duplicated) ---------- */
    if (!window.__vfTesterStyled) {
      window.__vfTesterStyled = true;
      var css = ""
        + ".vf-tester{--ink:#111110;--line:#111110;color:var(--ink);"
        + "font-family:'" + FONT_NAME + "',serif;padding:7vw 8vw 6vw;"
        + "box-sizing:border-box;-webkit-font-smoothing:antialiased;"
        + "display:flex;flex-direction:column;height:100vh;overflow:hidden;}"
        + ".vf-tester *{box-sizing:border-box;}"
        + ".vf-tester .vf-specimen{flex:1 1 auto;display:flex;align-items:center;"
        + "justify-content:center;overflow:hidden;font-size:132px;"
        + "line-height:1.05;text-align:center;letter-spacing:0;margin:0;outline:none;"
        + "text-transform:uppercase;word-break:break-word;}"
        + ".vf-tester .vf-specimen:empty::before{content:attr(data-placeholder);opacity:1;}"
        + ".vf-tester .controls-wrapper{flex-shrink:0;}"
        + ".vf-tester .vf-controls{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));"
        + "gap:10vw;max-width:900px;margin:0 auto;}"
        + ".vf-tester .vf-axis{position:relative;}"
        + ".vf-tester .vf-slider-wrap{position:relative;display:flex;align-items:center;}"
        + ".vf-tester input[type=range]{-webkit-appearance:none;appearance:none;width:100%;"
        + "height:20px;background:transparent;margin:0;cursor:ew-resize;}"
        + ".vf-tester input[type=range]::-webkit-slider-runnable-track{height:1px;background:var(--line);}"
        + ".vf-tester input[type=range]::-moz-range-track{height:1px;background:var(--line);}"
        + ".vf-tester input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:1px;"
        + "height:14px;border-radius:0;background:var(--ink);margin-top:-7px;}"
        + ".vf-tester input[type=range]::-moz-range-thumb{width:1px;height:14px;border-radius:0;"
        + "border:none;background:var(--ink);}"
        + ".vf-tester .vf-minmax{display:flex;justify-content:space-between;font-size:12px;"
        + "letter-spacing:0.06em;text-transform:uppercase;font-variant-caps:small-caps;margin-top:4px;}"
        + "@media (prefers-reduced-motion:reduce){.vf-tester *{transition:none !important;}}";

      var styleEl = document.createElement("style");
      styleEl.textContent = css;
      document.head.appendChild(styleEl);
    }

    /* ---------- load the variable font (only once, even if duplicated) ---------- */
    if (!window.__vfTesterFontLoaded) {
      window.__vfTesterFontLoaded = true;
      if ("FontFace" in window) {
        var face = new FontFace(FONT_NAME, "url(" + FONT_URL + ")", {
          weight: "1 999",
          style: "normal"
        });
        face.load().then(function (loaded) {
          document.fonts.add(loaded);
        }).catch(function (err) {
          console.error("Variable font failed to load:", err);
        });
      } else {
        // fallback for older browsers: plain @font-face via injected style
        var fallbackStyle = document.createElement("style");
        fallbackStyle.textContent = "@font-face{font-family:'" + FONT_NAME + "';"
          + "src:url('" + FONT_URL + "') format('woff2-variations'),"
          + "url('" + FONT_URL + "') format('woff2');font-weight:1 999;}";
        document.head.appendChild(fallbackStyle);
      }
    }

    /* ---------- build sliders (scoped to this instance only) ---------- */
    var specimen = root.querySelector(".vf-specimen");
    var controls = root.querySelector(".vf-controls");
    var values = {};

    function applyVariation() {
      var settings = AXES.map(function (a) {
        return '"' + a.tag + '" ' + values[a.tag];
      }).join(", ");
      specimen.style.fontVariationSettings = settings;
    }

    /* ---------- enforce character limit on the typable area ---------- */
    function placeCaretAtEnd(el) {
      var range = document.createRange();
      var sel = window.getSelection();
      range.selectNodeContents(el);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    /* ---------- shrink specimen text to fit its fixed-height box ---------- */
    var MAX_FONT_PX = 132;
    var MIN_FONT_PX = 18;
    var VW_CAP = 0.09; // matches the old clamp()'s 9vw upper bound

    function fitText() {
      var cap = Math.min(MAX_FONT_PX, window.innerWidth * VW_CAP);
      var size = cap;
      specimen.style.fontSize = size + "px";

      // shrink in steps until it fits both dimensions of its own box
      var guard = 0;
      while (
        guard < 60 &&
        size > MIN_FONT_PX &&
        (specimen.scrollHeight > specimen.clientHeight ||
          specimen.scrollWidth > specimen.clientWidth)
      ) {
        size -= 2;
        specimen.style.fontSize = size + "px";
        guard++;
      }
    }

    window.addEventListener("resize", fitText);

    specimen.addEventListener("input", function () {
      stopAutoplay();
      if (specimen.textContent.length > MAX_CHARS) {
        specimen.textContent = specimen.textContent.slice(0, MAX_CHARS);
        placeCaretAtEnd(specimen);
      }
      fitText();
    });

    // also catch paste events, which can jump well past the limit in one go
    specimen.addEventListener("paste", function (e) {
      e.preventDefault();
      var text = (e.clipboardData || window.clipboardData).getData("text");
      var current = specimen.textContent;
      var sel = window.getSelection();
      var allowed = MAX_CHARS - current.length;
      if (allowed <= 0) return;
      var insert = text.slice(0, allowed);
      if (sel.rangeCount) {
        var range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(document.createTextNode(insert));
        placeCaretAtEnd(specimen);
      }
      fitText();
    });

    var sliderEls = {};

    AXES.forEach(function (axis) {
      values[axis.tag] = axis.default;

      var wrap = document.createElement("div");
      wrap.className = "vf-axis";
      wrap.innerHTML =
        '<div class="vf-slider-wrap">' +
          '<input type="range" min="' + axis.min + '" max="' + axis.max +
            '" step="' + axis.step + '" value="' + axis.default + '" data-tag="' + axis.tag + '">' +
        '</div>' +
        '<div class="vf-minmax"><span>' + axis.low + '</span><span>' + axis.high + '</span></div>';

      var input = wrap.querySelector("input");
      sliderEls[axis.tag] = input;

      input.addEventListener("input", function () {
        values[axis.tag] = this.value;
        applyVariation();
      });

      // any manual interaction with a slider permanently stops autoplay
      input.addEventListener("pointerdown", stopAutoplay);
      input.addEventListener("touchstart", stopAutoplay, { passive: true });
      input.addEventListener("keydown", stopAutoplay);

      controls.appendChild(wrap);
    });

    applyVariation();
    fitText();
    var autoplayFrame = null;
    var autoplayActive = true;
    var autoplayStart = null;

    // roughly out-of-sync periods per axis so the two don't move in lockstep
    var AUTOPLAY_PERIODS = [5200, 6700];

    function stepAutoplay(timestamp) {
      if (!autoplayActive) return;
      if (autoplayStart === null) autoplayStart = timestamp;
      var elapsed = timestamp - autoplayStart;

      AXES.forEach(function (axis, i) {
        var period = AUTOPLAY_PERIODS[i % AUTOPLAY_PERIODS.length];
        var phase = i * (Math.PI / 2);
        var angle = (elapsed / period) * Math.PI * 2 + phase;
        var normalized = (Math.sin(angle) + 1) / 2; // 0..1, eases at the ends
        var val = axis.min + (axis.max - axis.min) * normalized;

        values[axis.tag] = val;
        if (sliderEls[axis.tag]) sliderEls[axis.tag].value = val;
      });

      applyVariation();
      autoplayFrame = requestAnimationFrame(stepAutoplay);
    }

    function stopAutoplay() {
      if (!autoplayActive) return;
      autoplayActive = false;
      if (autoplayFrame) cancelAnimationFrame(autoplayFrame);
    }

    autoplayFrame = requestAnimationFrame(stepAutoplay);
  })();
</script>
</body></html>
